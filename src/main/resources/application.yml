spring:
  application:
    name: auth-chat-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chat}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Base já populada pelo Hibernate / SQL manual sem flyway_schema_history: cria o histórico e
    # assume a versão 1 sem voltar a executar V1 (evita "relation already exists").
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

acesso:
  repouso:
    # Mesmo tamanho mínimo que a chave JWT; em produção use segredo dedicado (env).
    segredoMestreArmazenamento: ${REP_SEGREDO:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  jwt:
    # Mínimo 32 caracteres (256 bits) para HS256; sobrescreva em produção.
    chaveAssinatura: ${JWT_CHAVE:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    duracaoValidadeMilis: ${JWT_DURACAO_MS:900000}
  cors:
    origens: ${CORS_ORIGENS:http://localhost:*,http://127.0.0.1:*}

logging:
  level:
    com.authcore: INFO
